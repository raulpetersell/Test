<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Ladina Õppija</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #121212;
    color: #f1f1f1;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 40px;
}

#question {
    font-size: 28px;
    margin: 30px;
}

input {
    padding: 10px;
    font-size: 18px;
    width: 250px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

#result {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>Ladina keele õppimine</h1>

<div id="question">Laeb küsimust...</div>

<input type="text" id="answer" placeholder="Sisesta tõlge">
<br>
<button onclick="checkAnswer()">Kontrolli</button>

<div id="result"></div>

<script>
const words = [
    { est: "armastus", lat: "amor" },
    { est: "sõber", lat: "amicus" },
    { est: "vesi", lat: "aqua" },
    { est: "päike", lat: "sol" },
    { est: "maa", lat: "terra" }
];

let current;

function newQuestion() {
    current = words[Math.floor(Math.random() * words.length)];
    document.getElementById("question").innerText =
        "Mis on ladina keeles: " + current.est + "?";
    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
}

function checkAnswer() {
    let userAnswer = document.getElementById("answer").value.toLowerCase();

    if (userAnswer === current.lat) {
        document.getElementById("result").innerText = "Õige! 👍";
    } else {
        document.getElementById("result").innerText =
            "Vale! Õige vastus on: " + current.lat;
    }

    setTimeout(newQuestion, 2000);
}

newQuestion();
</script>

</body>
</html>
